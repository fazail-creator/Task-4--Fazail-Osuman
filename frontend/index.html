<!DOCTYPE html>
<html><head><meta charset='UTF-8'><title>Intern Management</title>
<link rel='stylesheet' href='styles.css'></head>
<body>
<div class='container'>
<h1>Intern Management System</h1>
<form id='internForm'>
<input id='name' placeholder='Name' required>
<input id='email' type='email' placeholder='Email' required>
<input id='department' placeholder='Department' required>
<input id='phone' placeholder='Phone' required>
<button type='submit'>Add Intern</button>
</form>
<p id='message'></p>
<h2>Registered Interns</h2>
<div id='internList'></div>
</div>
<script src='script.js'></script>
</body></html>
